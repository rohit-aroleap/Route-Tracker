<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Tech View · BLR Tracker · v1.114</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #F5F2EB;
  --surface: #FEFCF7;
  --surface2: #EDE9DF;
  --ink: #1A1714;
  --ink2: #6B6560;
  --ink3: #A09A94;
  --accent: #C84B2F;
  --accent2: #2F6EC8;
  --accent3: #2E8B57;
  --border: rgba(26,23,20,0.12);
  --border2: rgba(26,23,20,0.07);
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --serif: 'Fraunces', serif;
  --r: 6px;
  --r2: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}

/* Loading / Error screens */
.screen-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.screen-center h1{font-family:var(--serif);font-weight:300;font-size:24px;margin-bottom:8px}
.screen-center p{color:var(--ink2);font-size:13px;max-width:300px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--ink);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-logo{font-family:var(--serif);font-size:16px;font-weight:300}
.header-logo span{color:var(--accent);font-style:italic}
.header-meta{flex:1;text-align:right}
.header-guide{font-family:var(--mono);font-size:12px;font-weight:500}
.header-date{font-size:11px;color:rgba(255,255,255,0.5);font-family:var(--mono)}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background 0.3s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.pulsing{animation:pulse 1.2s ease-in-out infinite}

/* Stop list */
.stop-list{padding:12px;display:flex;flex-direction:column;gap:12px;padding-bottom:80px}

/* Stop card */
.stop-card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stop-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border2)}
.stop-num{width:28px;height:28px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stop-name{font-weight:500;font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stop-time{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent3);background:#E8F5E9;padding:2px 8px;border-radius:12px;flex-shrink:0}

.stop-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.stop-actions-row{display:flex;gap:8px}
.action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--ink);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;min-height:44px;transition:all 0.15s}
.action-btn:active{transform:scale(0.97)}
.action-btn-phone{background:#E3F2FD;color:#1565C0;border-color:#1565C033}
.action-btn-maps{background:#E8F5E9;color:#2E7D32;border-color:#2E7D3233}

.stop-address{font-size:12px;color:var(--ink2);line-height:1.4}
.stop-notes{font-size:12px;color:var(--ink3);font-style:italic;background:var(--bg);padding:6px 10px;border-radius:var(--r);border-left:3px solid var(--border)}

/* Tech status */
.tech-status-row{display:flex;align-items:center;gap:6px;padding:6px 0}
.tech-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tech-status-label{font-size:12px;font-family:var(--mono);font-weight:500}
.tech-status-time{font-size:10px;color:var(--ink3);font-family:var(--mono)}

/* Status update buttons */
.stop-footer{padding:10px 14px;border-top:1px solid var(--border2);background:var(--bg)}
.status-btn{width:100%;padding:14px 16px;border-radius:var(--r2);border:none;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;min-height:48px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.status-btn:active{transform:scale(0.97);opacity:0.85}
.status-btn-primary{background:var(--accent2);color:#fff}
.status-btn-success{background:var(--accent3);color:#fff}
.status-btn-danger{background:#B71C1C;color:#fff}
.status-btn-warn{background:#6A1B9A;color:#fff}
.status-btn-row{display:flex;gap:8px;margin-top:8px}
.status-btn-row .status-btn{flex:1;font-size:13px;padding:12px 8px}

/* Stepper (v1.112) */
.stepper{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.step-row{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;min-height:48px;user-select:none;-webkit-tap-highlight-color:transparent;transition:background 0.15s,border-color 0.15s}
.step-row:active{transform:scale(0.99)}
.step-row .step-dot{width:22px;height:22px;border-radius:50%;border:2px solid #9CA3AF;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;line-height:1}
.step-row.checked{background:#ECFDF5;border-color:#10B981}
.step-row.checked .step-dot{background:#10B981;border-color:#10B981}
.step-row.checked .step-dot::after{content:'✓'}
.step-row.current-checked{box-shadow:0 0 0 2px #10B981 inset}
.step-row.disabled,.step-row.locked-disabled{opacity:0.55;cursor:not-allowed}
.step-label{flex:1;font-size:14px;color:#111;font-weight:500}
.step-row.checked .step-label{color:#065F46}
.step-hint{font-size:10px;color:var(--ink3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.04em}
.step-variants{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.step-variant-btn{padding:10px 8px;border-radius:6px;border:1px solid var(--border);background:#fff;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;min-height:44px;-webkit-tap-highlight-color:transparent}
.step-variant-btn:active{transform:scale(0.97)}
.step-variant-btn.v-install{background:#E8F5E9;color:#2E7D32;border-color:#2E7D3255}
.step-variant-btn.v-maint{background:#E0F2FE;color:#0369A1;border-color:#0369A155}
.step-variant-btn.v-reinstall{background:#D1FAE5;color:#047857;border-color:#04785755}
.step-variant-btn.v-uninstall{background:#F3E8FF;color:#9333EA;border-color:#9333EA55}

/* Done card */
.stop-card.is-done{opacity:0.6}
.stop-card.is-done .stop-footer{background:#E8F5E9}

/* Status timeline */
.timeline{display:flex;flex-direction:column;gap:4px;padding:4px 0}
.timeline-item{display:flex;align-items:center;gap:8px;font-size:11px;font-family:var(--mono);color:var(--ink2)}
.timeline-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-family:var(--mono);z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}

/* Empty state */
.empty-state{text-align:center;padding:60px 24px;color:var(--ink3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state h2{font-family:var(--serif);font-weight:300;font-size:20px;color:var(--ink2);margin-bottom:6px}

/* Summary bar */
.summary-bar{margin:12px 12px 0;padding:10px 14px;background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:12px;font-family:var(--mono)}
.summary-stat{text-align:center}
.summary-stat .val{font-size:18px;font-family:var(--serif);font-weight:600}
.summary-stat .lbl{font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.05em}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen" class="screen-center">
  <div class="spinner"></div>
  <h1>Loading stops...</h1>
  <p>Connecting to server</p>
</div>

<!-- Error screen -->
<div id="error-screen" class="screen-center" style="display:none">
  <div style="font-size:48px;margin-bottom:12px">⚠️</div>
  <h1 id="error-title">Invalid Link</h1>
  <p id="error-msg">This link is missing required parameters. Please ask your admin for a valid link.</p>
  <button id="retry-btn" onclick="location.reload()" style="display:none;margin-top:16px;padding:10px 28px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-size:15px;font-weight:600;cursor:pointer">🔄 Retry</button>
</div>

<!-- Main app -->
<div id="app" style="display:none">
  <div class="header">
    <div>
      <div class="header-logo">Blr<span>Install</span></div>
    </div>
    <div class="header-meta">
      <div class="header-guide" id="h-guide"></div>
      <div class="header-date" id="h-date"></div>
    </div>
    <div class="sync-dot" id="sync-dot" style="background:rgba(255,200,50,0.9)" title="Connecting..."></div>
  </div>

  <div id="offline-banner" style="display:none;background:#FEF3C7;color:#92400E;text-align:center;padding:8px 14px;font-size:12px;font-weight:600;font-family:var(--mono)">📡 You're offline — changes will sync when connected</div>
  <div id="summary"></div>
  <div id="stop-list" class="stop-list"></div>
</div>

<div id="toast" class="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ─── CONFIG ─── */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDMaVnRPjK55-T95m9AS49Ju_bgR_p42ic",
  authDomain:        "mapping-ferra-installation.firebaseapp.com",
  databaseURL:       "https://mapping-ferra-installation-default-rtdb.firebaseio.com",
  projectId:         "mapping-ferra-installation",
  storageBucket:     "mapping-ferra-installation.firebasestorage.app",
  messagingSenderId: "1037635127527",
  appId:             "1:1037635127527:web:a56c96436da69244097a42"
};
const FB_PATH = 'blr_tracker/v2';

const DAY_PLAN = [
  {day:1,date:"11 Apr",dateLabel:"Saturday, 11 April",zone:"North",label:"North — Hebbal / Yelahanka",color:"#1e40af",bg:"#DBEAFE"},
  {day:2,date:"12 Apr",dateLabel:"Sunday, 12 April",zone:"North-West",label:"North-West — Rajajinagar",color:"#5b21b6",bg:"#EDE9FE"},
  {day:3,date:"13 Apr",dateLabel:"Monday, 13 April",zone:"East",label:"East — Whitefield Corridor",color:"#065f46",bg:"#D1FAE5"},
  {day:4,date:"14 Apr",dateLabel:"Tuesday, 14 April",zone:"Central",label:"Central — Indiranagar, Bellandur",color:"#92400e",bg:"#FEF3C7"},
  {day:5,date:"15 Apr",dateLabel:"Wednesday, 15 April",zone:"South",label:"South — HSR, Sarjapur, Begur",color:"#9f1239",bg:"#FFE4E6"},
  {day:6,date:"16 Apr",dateLabel:"Thursday, 16 April",zone:"South",label:"South — Banashankari",color:"#9f1239",bg:"#FFE4E6"},
  {day:7,date:"17 Apr",dateLabel:"Friday, 17 April",zone:"Outer",label:"Outer — Attibele, Nelamangala",color:"#374151",bg:"#F3F4F6"},
];

const GUIDE_COLORS = {
  1:{color:'#1e40af',bg:'#DBEAFE',label:'Murthy'},
  2:{color:'#b45309',bg:'#FEF3C7',label:'Divakar'},
};

const TECH_STATUSES = [
  {value:'not_started',   label:'Not Started',         icon:'⏳', color:'#64748b', bg:'#F1F5F9'},
  {value:'on_my_way',     label:'On My Way',           icon:'🚗', color:'#2563eb', bg:'#DBEAFE'},
  {value:'reached',       label:'Reached',             icon:'📍', color:'#7c3aed', bg:'#EDE9FE'},
  {value:'started',       label:'Started',             icon:'🔧', color:'#b45309', bg:'#FEF3C7'},
  {value:'install_done',  label:'Installation Done',   icon:'✅', color:'#2E7D32', bg:'#E8F5E9'},
  {value:'maint_done',    label:'Maintenance Done',    icon:'🔩', color:'#0369A1', bg:'#E0F2FE'},
  {value:'reinstall_done',label:'Reinstallation Done', icon:'🔄', color:'#047857', bg:'#D1FAE5'},
  {value:'uninstall_done',label:'Uninstallation Done',icon:'🔌', color:'#9333EA', bg:'#F3E8FF'},
  {value:'completed',     label:'Completed',           icon:'✅', color:'#2E7D32', bg:'#E8F5E9'},
  {value:'cancelled',     label:'Cancelled',           icon:'❌', color:'#B71C1C', bg:'#FCE4EC'},
  {value:'rescheduled',   label:'Rescheduled',         icon:'📅', color:'#6A1B9A', bg:'#EDE7F6'},
];

function techStatusInfo(s){
  if(s==='en_route') s='on_my_way'; // legacy alias
  return TECH_STATUSES.find(t=>t.value===s)||null;
}

function normalizeStatus(s){
  if(!s||s==='confirmed'||s==='pending') return 'paid';
  if(s==='future') return 'scheduled';
  return s;
}

function fmtTime(t){
  if(!t) return '';
  const [h,m]=t.split(':').map(Number);
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function fmtShortTime(isoStr){
  if(!isoStr) return '';
  const d=new Date(isoStr);
  const h=d.getHours(), m=d.getMinutes();
  const ampm=h>=12?'PM':'AM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function getEntryCalDate(r){
  if(r.day>=1&&r.day<=7){
    const dp=DAY_PLAN.find(d=>d.day===r.day);
    if(dp) return parseInt(dp.date);
  }
  if(r.date){ const m=r.date.match(/\d+/); if(m) return parseInt(m[0]); }
  return null;
}

/* ─── Stepper state machine (v1.112) ───────────────────────────────
   Four visible steps: 1=On My Way, 2=Reached, 3=Started, 4=Done.
   Step 4 has four variants (install/maint/reinstall/uninstall done).
   cancelled/rescheduled are terminal and hide the stepper entirely. */
const DONE_VARIANTS = ['install_done','maint_done','reinstall_done','uninstall_done','completed'];
function stepIndex(ts){
  if(!ts || ts==='not_started') return 0;
  if(ts==='on_my_way' || ts==='en_route') return 1;
  if(ts==='reached') return 2;
  if(ts==='started') return 3;
  if(DONE_VARIANTS.indexOf(ts) !== -1) return 4;
  if(ts==='cancelled' || ts==='rescheduled') return -1;
  return 0;
}
// One step backward. Used by the retreat-tap handler.
function prevStatus(ts){
  if(ts==='on_my_way' || ts==='en_route') return 'not_started';
  if(ts==='reached') return 'on_my_way';
  if(ts==='started') return 'reached';
  if(DONE_VARIANTS.indexOf(ts) !== -1) return 'started';
  return 'not_started';
}
const STEP_LABELS = ['', '🚗 On my way', '📍 Reached site', '🔧 Started installation', '✅ Done'];
// Per-row flag: true while the tech has tapped step 4 and is choosing a variant.
const _expandingStep4 = {};

/* ─── STATE ─── */
let db = [];
let routeGuide = {};
let routeStopTimes = {};
let routeOrders = {};
let _fbRef = null;
let dayLocks = {};
function isDayLocked(cd){ return cd!=null && !!dayLocks[cd]; }
// Prefer r.date over r.day for lock checks — see index.html rowCalDate() comment.
function rowCalDate(row){
  if(!row) return null;
  if(row.date){
    const m = String(row.date).match(/\d+/);
    if(m){ const n = parseInt(m[0]); if(n>=1 && n<=31) return n; }
  }
  if(row.day>=1 && row.day<=7){
    const dp = DAY_PLAN.find(d=>d.day===row.day);
    if(dp){ const m = String(dp.date).match(/\d+/); if(m) return parseInt(m[0]); }
  }
  return null;
}
function isRowDayLocked(r){ return r && isDayLocked(rowCalDate(r)); }
let guideNum, calDay, guideName, guideColor, dayLabel;

/* ─── URL PARAMS ─── */
const params = new URLSearchParams(location.search);
guideNum = parseInt(params.get('guide'));
calDay = parseInt(params.get('date'));

if(!guideNum || !calDay || !GUIDE_COLORS[guideNum]){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('error-screen').style.display='flex';
  if(!params.get('guide')&&!params.get('date')){
    document.getElementById('error-title').textContent='Missing Parameters';
    document.getElementById('error-msg').textContent='URL needs ?guide=1&date=14 parameters. Ask your admin for the correct link.';
  }
} else {
  guideName = GUIDE_COLORS[guideNum].label;
  guideColor = GUIDE_COLORS[guideNum].color;
  const dp = DAY_PLAN.find(d=>parseInt(d.date)===calDay);
  dayLabel = dp ? dp.dateLabel : calDay+' April';

  document.getElementById('h-guide').textContent = guideName;
  document.getElementById('h-guide').style.color = guideColor;
  document.getElementById('h-date').textContent = dayLabel;

  initFirebase();
}

/* ─── CACHE ─── */
const CACHE_KEY='blr_tech_'+guideNum+'_'+calDay;
function saveToCache(){
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      db:db, routeGuide:routeGuide, routeStopTimes:routeStopTimes, routeOrders:routeOrders, ts:Date.now()
    }));
  } catch(e){}
}
function loadFromCache(){
  try {
    const raw=localStorage.getItem(CACHE_KEY);
    if(!raw) return false;
    const c=JSON.parse(raw);
    if(!c.db||!c.db.length) return false;
    // Use cache if less than 24 hours old
    if(Date.now()-c.ts > 86400000) return false;
    db=c.db;
    if(c.routeGuide) Object.assign(routeGuide, c.routeGuide);
    if(c.routeStopTimes) Object.assign(routeStopTimes, c.routeStopTimes);
    if(c.routeOrders) Object.assign(routeOrders, c.routeOrders);
    return true;
  } catch(e){ return false; }
}

/* ─── FIREBASE ─── */
let _authRetries=0;
const MAX_RETRIES=3;

function showApp(){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
}
function showError(title, msg, showRetry){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('error-screen').style.display='flex';
  document.getElementById('error-title').textContent=title;
  document.getElementById('error-msg').textContent=msg;
  if(showRetry) document.getElementById('retry-btn').style.display='inline-block';
}

function initFirebase(){
  try {
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db2 = firebase.database();
    _fbRef = db2.ref(FB_PATH);

    // Load cached data immediately so page isn't blank
    const hadCache = loadFromCache();
    if(hadCache){
      showApp();
      renderStops();
    }

    attemptAuth(db2, hadCache);

  } catch(e){
    if(!document.getElementById('app').style.display||document.getElementById('app').style.display==='none'){
      showError('Error', e.message, true);
    }
  }
}

function attemptAuth(db2, hadCache){
  firebase.auth().signInAnonymously().then(()=>{
    if(!hadCache) showApp();
    setupListeners(db2);
  }).catch(err=>{
    _authRetries++;
    if(_authRetries < MAX_RETRIES){
      // Retry after 2s, 4s, 6s
      setTimeout(()=>attemptAuth(db2, hadCache), _authRetries * 2000);
      if(!hadCache){
        document.querySelector('#loading-screen p').textContent='Retrying connection ('+_authRetries+'/'+MAX_RETRIES+')...';
      }
    } else {
      if(!hadCache){
        showError('Connection Failed', 'Could not connect after '+MAX_RETRIES+' attempts. Check your internet connection and try again.', true);
      } else {
        toast('⚠️ Offline — showing cached data');
      }
    }
  });
}

function setupListeners(db2){
  const rowsRef = _fbRef.child('rows');
  rowsRef.on('child_added', snap=>{
    const r=snap.val(); if(!r||!r.id) return;
    const idx=db.findIndex(x=>x.id===r.id);
    if(idx<0) db.push(r); else db[idx]=r;
    renderStops(); saveToCache();
  });
  rowsRef.on('child_changed', snap=>{
    const r=snap.val(); if(!r||!r.id) return;
    const idx=db.findIndex(x=>x.id===r.id);
    if(idx>=0) db[idx]=r; else db.push(r);
    renderStops(); saveToCache();
  });
  rowsRef.on('child_removed', snap=>{
    const r=snap.val(); if(!r||!r.id) return;
    const idx=db.findIndex(x=>x.id===r.id);
    if(idx>=0) db.splice(idx,1);
    renderStops(); saveToCache();
  });

  // Meta listener
  _fbRef.child('meta').on('value', snap=>{
    const m=snap.val(); if(!m) return;
    if(m.routeGuide){ routeGuide={}; Object.assign(routeGuide,m.routeGuide); }
    if(m.routeStopTimes){ routeStopTimes={}; Object.assign(routeStopTimes,m.routeStopTimes); }
    if(m.routeOrders){ routeOrders={}; Object.assign(routeOrders,m.routeOrders); }
    renderStops(); saveToCache();
  });

  // Day-level data locks listener (admin-set locks on calendar days)
  _fbRef.child('meta/dayLocks').on('value', snap=>{
    dayLocks = snap.val() || {};
    renderStops();
  });

  // Connection status + offline banner
  db2.ref('.info/connected').on('value', snap=>{
    const dot=document.getElementById('sync-dot');
    const banner=document.getElementById('offline-banner');
    if(snap.val()){
      dot.style.background='rgba(100,220,120,0.9)';
      dot.classList.remove('pulsing');
      dot.title='Connected';
      banner.style.display='none';
    } else {
      dot.style.background='rgba(220,100,80,0.9)';
      dot.classList.remove('pulsing');
      dot.title='Offline';
      banner.style.display='block';
    }
  });
}

/* ─── RENDER ─── */
function getMyStops(){
  // Primary: use routeOrders[calDay] — the same source the admin route planner uses.
  // This handles entries whose r.day/r.date fields don't match calDay
  // (e.g. entries originally created for a different day but moved in the planner).
  // Fallback: filter by getEntryCalDate for days with no routeOrders saved yet.
  let dayEntries;
  const order = routeOrders[calDay];
  if(Array.isArray(order)){
    // routeOrders exists for this day (even if empty) — use it authoritatively.
    // An empty array means the admin explicitly cleared all stops for this day.
    dayEntries = order.map(id=>db.find(r=>r.id===id)).filter(Boolean);
  } else {
    // No routeOrders saved for this day yet — fall back to date-based filter
    dayEntries = db.filter(r=>getEntryCalDate(r)===calDay);
  }
  const myStops = dayEntries.filter(r=>routeGuide[r.id]===guideNum);
  // Sort by confirmed time, preserving routeOrders position for untimed stops
  return myStops.sort((a,b)=>{
    const ta=routeStopTimes[a.id]||'99:99';
    const tb=routeStopTimes[b.id]||'99:99';
    if(ta!==tb) return ta<tb?-1:1;
    return 0;
  });
}

function renderStops(){
  const stops=getMyStops();
  const list=document.getElementById('stop-list');
  const summary=document.getElementById('summary');

  const dayLockedBanner = isDayLocked(calDay)
    ? `<div style="margin:10px 14px;padding:10px 12px;border-radius:8px;background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;font-size:12px;font-family:var(--sans);text-align:center">🔒 Day locked by admin — read-only. Contact office for changes.</div>`
    : '';

  if(!stops.length){
    list.innerHTML=dayLockedBanner+'<div class="empty-state"><div class="icon">📋</div><h2>No stops assigned</h2><p>No installations assigned to '+guideName+' for '+dayLabel+'</p></div>';
    summary.innerHTML='';
    return;
  }

  // Summary bar
  const DONE_STATUSES=['completed','install_done','maint_done','reinstall_done','uninstall_done'];
  const SKIP_STATUSES=['cancelled','rescheduled'];
  const done=stops.filter(r=>DONE_STATUSES.includes(r.techStatus)).length;
  const inProgress=stops.filter(r=>r.techStatus&&r.techStatus!=='not_started'&&!DONE_STATUSES.includes(r.techStatus)&&!SKIP_STATUSES.includes(r.techStatus)).length;
  const pending=stops.filter(r=>!r.techStatus||r.techStatus==='not_started').length;
  const cancelled=stops.filter(r=>SKIP_STATUSES.includes(r.techStatus)).length;
  summary.innerHTML=`<div class="summary-bar">
    <div class="summary-stat"><div class="val">${stops.length}</div><div class="lbl">Total</div></div>
    <div class="summary-stat"><div class="val" style="color:var(--accent3)">${done}</div><div class="lbl">Done</div></div>
    <div class="summary-stat"><div class="val" style="color:var(--accent2)">${inProgress}</div><div class="lbl">Active</div></div>
    <div class="summary-stat"><div class="val" style="color:var(--ink3)">${pending}</div><div class="lbl">Pending</div></div>
    ${cancelled?`<div class="summary-stat"><div class="val" style="color:#B71C1C">${cancelled}</div><div class="lbl">Skip</div></div>`:''}
  </div>`;

  list.innerHTML=dayLockedBanner+stops.map((r,i)=>renderCard(r,i+1)).join('');
}

function renderCard(r, num){
  const time=routeStopTimes[r.id];
  const ts=r.techStatus||'';
  const isTerminal=ts==='completed'||ts==='install_done'||ts==='maint_done'||ts==='reinstall_done'||ts==='uninstall_done'||ts==='cancelled'||ts==='rescheduled';
  const cardClass=isTerminal?'stop-card is-done':'stop-card';

  // Address line
  let addr='';
  if(r.area) addr+=r.area;
  if(r.pin) addr+=(addr?', ':'')+r.pin;

  // Maps link
  let mapsUrl='';
  if(r.locationUrl) mapsUrl=r.locationUrl;
  else if(r.lat&&r.lng) mapsUrl='https://maps.google.com/?q='+r.lat+','+r.lng;

  // Timeline from techStatusLog
  let timelineHtml='';
  if(r.techStatusLog&&r.techStatusLog.length){
    timelineHtml='<div class="timeline">'+r.techStatusLog.map(entry=>{
      const info=techStatusInfo(entry.status);
      return `<div class="timeline-item">
        <div class="timeline-dot" style="background:${info?info.color:'#999'}"></div>
        <span>${info?info.label:entry.status}</span>
        <span style="color:var(--ink3)">${fmtShortTime(entry.at)}</span>
      </div>`;
    }).join('')+'</div>';
  }

  // Current status display
  let statusHtml='';
  {
    const effectiveTs=ts||'not_started';
    const info=techStatusInfo(effectiveTs);
    const lastLog=r.techStatusLog&&r.techStatusLog.length?r.techStatusLog[r.techStatusLog.length-1]:null;
    statusHtml=`<div class="tech-status-row">
      <div class="tech-status-dot" style="background:${info?info.color:'#999'}"></div>
      <span class="tech-status-label" style="color:${info?info.color:'#999'}">${info?info.icon+' '+info.label:effectiveTs}</span>
      ${lastLog?`<span class="tech-status-time">${fmtShortTime(lastLog.at)}</span>`:''}
    </div>`;
  }

  // Stepper (v1.112) — all four steps always visible as toggleable rows.
  // Advancing: tap the row at currentStep+1. Retreating: tap the topmost
  // checked row (currentStep). Lower rows / future rows reject with a toast.
  // All taps route through updateTechStatus() so v1.111 guards still apply.
  const rowLocked = isRowDayLocked(r);
  const fromTs = ts || 'not_started';
  let buttonsHtml = '';
  if(stepIndex(ts) !== -1){
    buttonsHtml = renderStepper(r, fromTs, rowLocked);
  }

  return `<div class="${cardClass}">
    <div class="stop-header">
      <div class="stop-num" style="background:${guideColor}">${num}</div>
      <div class="stop-name">${escHtml(r.name||'—')}</div>
      ${time?`<div class="stop-time">${fmtTime(time)}</div>`:''}
    </div>
    <div class="stop-body">
      <div class="stop-actions-row">
        ${r.phone?`<a href="tel:${r.phone}" class="action-btn action-btn-phone">📞 ${r.phone}</a>`:''}
        ${mapsUrl?`<a href="${mapsUrl}" target="_blank" rel="noopener" class="action-btn action-btn-maps">📍 Open Maps</a>`:''}
      </div>
      ${addr?`<div class="stop-address">${escHtml(addr)}</div>`:''}
      ${r.notes?`<div class="stop-notes">📝 ${escHtml(r.notes)}</div>`:''}
      ${timelineHtml}
      ${statusHtml}
    </div>
    ${buttonsHtml?`<div class="stop-footer">${buttonsHtml}</div>`:'<div class="stop-footer" style="padding:8px 14px;text-align:center;font-size:11px;color:var(--ink3);font-family:var(--mono)">'+(isTerminal?(techStatusInfo(ts)?techStatusInfo(ts).icon+' '+techStatusInfo(ts).label:ts):'—')+'</div>'}
  </div>`;
}

/* ─── STEPPER RENDER + TAP WRAPPERS (v1.112) ───────────────────── */
function renderStepper(r, fromTs, rowLocked){
  const curIdx = stepIndex(r.techStatus || 'not_started');
  const lockAttr = rowLocked ? ' locked-disabled' : '';
  const expanded = !rowLocked && curIdx === 3 && _expandingStep4[r.id];
  let html = '<div class="stepper">';
  for(let n = 1; n <= 4; n++){
    const isChecked = n <= curIdx;
    const isCurrent = n === curIdx;          // topmost checked → tap = retreat
    const isNext    = n === curIdx + 1;      // next up         → tap = advance
    // Label for step 4 when it's been ticked: reflect the actual done-variant.
    let label = STEP_LABELS[n];
    if(n === 4 && curIdx === 4){
      const info = techStatusInfo(r.techStatus);
      if(info) label = info.icon + ' ' + info.label;
    }
    const classes = 'step-row' +
      (isChecked ? ' checked' : '') +
      (isCurrent ? ' current-checked' : '') +
      lockAttr;
    // Click dispatch — the handler figures out advance vs retreat vs reject.
    let onclick;
    if(rowLocked){
      onclick = `toast('🔒 Day locked by admin — contact office')`;
    } else if(isCurrent){
      onclick = `retreatStep(${r.id},'${r.techStatus||'not_started'}')`;
    } else if(n === 4 && isNext){
      onclick = `advanceStep(${r.id},4,'${fromTs}')`;  // reveals variants
    } else {
      onclick = `advanceStep(${r.id},${n},'${fromTs}')`;
    }
    let hint = '';
    if(!rowLocked){
      if(isCurrent && n < 4) hint = '<span class="step-hint">tap to undo</span>';
      else if(isCurrent && n === 4) hint = '<span class="step-hint">tap to undo</span>';
      else if(isNext) hint = '<span class="step-hint">tap next</span>';
    }
    html += `<div class="${classes}" onclick="${onclick}">
      <div class="step-dot">${!isChecked ? n : ''}</div>
      <div class="step-label">${label}</div>
      ${hint}
    </div>`;
    // Variant picker immediately after step 4 row, only when expanded.
    if(n === 4 && expanded){
      html += `<div class="step-variants">
        <button class="step-variant-btn v-install"   onclick="pickDoneVariant(${r.id},'install_done','${fromTs}')">✅ Installation Done</button>
        <button class="step-variant-btn v-maint"     onclick="pickDoneVariant(${r.id},'maint_done','${fromTs}')">🔩 Maintenance Done</button>
        <button class="step-variant-btn v-reinstall" onclick="pickDoneVariant(${r.id},'reinstall_done','${fromTs}')">🔄 Reinstallation Done</button>
        <button class="step-variant-btn v-uninstall" onclick="pickDoneVariant(${r.id},'uninstall_done','${fromTs}')">🔌 Uninstallation Done</button>
      </div>`;
    }
  }
  html += '</div>';
  // Cancel / Reschedule row — visible once step 3 is ticked and not yet terminal.
  if(curIdx >= 3 && curIdx < 4){
    if(rowLocked){
      html += `<div class="status-btn-row">
        <button class="status-btn status-btn-danger" disabled style="opacity:0.45;cursor:not-allowed;pointer-events:none">❌ Cancel</button>
        <button class="status-btn status-btn-warn" disabled style="opacity:0.45;cursor:not-allowed;pointer-events:none">📅 Reschedule</button>
      </div>`;
    } else {
      html += `<div class="status-btn-row">
        <button class="status-btn status-btn-danger" onclick="updateTechStatus(${r.id},'cancelled','${fromTs}')">❌ Cancel</button>
        <button class="status-btn status-btn-warn"   onclick="updateTechStatus(${r.id},'rescheduled','${fromTs}')">📅 Reschedule</button>
      </div>`;
    }
  }
  return html;
}

function advanceStep(id, stepN, fromTs){
  const row = db.find(x => x.id === id);
  if(!row) return;
  if(isRowDayLocked(row)){ toast('🔒 Day locked by admin — contact office'); return; }
  const curIdx = stepIndex(row.techStatus || 'not_started');
  if(stepN !== curIdx + 1){
    toast(`Tap step ${curIdx + 1} first`);
    return;
  }
  if(stepN === 4){
    // Reveal the 4 done-variant chips instead of auto-picking one.
    _expandingStep4[id] = true;
    renderStops();
    return;
  }
  const nextStatus = ['not_started','on_my_way','reached','started'][stepN];
  updateTechStatus(id, nextStatus, fromTs);
}

function retreatStep(id, fromTs){
  const row = db.find(x => x.id === id);
  if(!row) return;
  if(isRowDayLocked(row)){ toast('🔒 Day locked by admin — contact office'); return; }
  // If we're retreating from the expanded step-4 picker (step 3 checked,
  // variants showing), just collapse the picker without a write.
  if(stepIndex(row.techStatus || 'not_started') === 3 && _expandingStep4[id]){
    delete _expandingStep4[id];
    renderStops();
    return;
  }
  const target = prevStatus(fromTs);
  updateTechStatus(id, target, fromTs);
}

function pickDoneVariant(id, variant, fromTs){
  delete _expandingStep4[id];
  updateTechStatus(id, variant, fromTs);
}

/* ─── STATUS UPDATE ─── */
const _writingIds=new Set(); // prevent duplicate writes while one is in flight
// Per-row timestamp of the last accepted tap. Blocks rapid successive taps
// (e.g. a synthetic click arriving after a live-sync re-render swaps the
// button under the tech's finger) for ROW_TAP_LOCKOUT_MS.
const _lastTapAt = {};
const ROW_TAP_LOCKOUT_MS = 1000;
function updateTechStatus(id, newStatus, expectedFromStatus){
  if(_writingIds.has(id)) return; // write in progress for this row — ignore tap
  const row=db.find(r=>r.id===id);
  if(!row) return;
  if(isRowDayLocked(row)){ toast('🔒 Day locked by admin — contact office'); return; }

  // ─── Tap-through guard ─────────────────────────────────────────────────
  // Every action button is rendered with the status it was "going from".
  // If the row has since moved on (because another client updated it, or
  // the tech's own previous tap completed and re-rendered new buttons at
  // the same coordinates), reject the tap. The tech didn't intentionally
  // tap the button that's now on screen — they tapped the one that WAS.
  if(expectedFromStatus !== undefined){
    const actualFrom = row.techStatus || 'not_started';
    if(actualFrom !== expectedFromStatus){
      toast('↻ Status updated — please tap again');
      renderStops();
      return;
    }
  }

  // ─── Per-row lockout ───────────────────────────────────────────────────
  // Mobile Safari/Chrome fire a synthetic click ~0-300ms after touchend.
  // If renderStops() runs in that window, the click lands on a new button.
  // Ignore any tap for ROW_TAP_LOCKOUT_MS after an accepted one.
  const nowMs = Date.now();
  if(_lastTapAt[id] && (nowMs - _lastTapAt[id]) < ROW_TAP_LOCKOUT_MS){
    return;  // silent: tech didn't mean to do this
  }
  _lastTapAt[id] = nowMs;

  // Snapshot for undo
  const prevStatus = row.techStatus || null;
  const prevMainStatus = row.status;
  const prevLog = (row.techStatusLog && row.techStatusLog.slice()) || [];
  const prevLogLen = prevLog.length;

  // Detect retreat: new step is strictly lower than current. On retreat we
  // pop the last log entry (log represents forward progress only) and clear
  // any terminal row.status so the row goes back to "scheduled".
  const isRetreat = stepIndex(newStatus) < stepIndex(prevStatus || 'not_started');

  row.techStatus = newStatus;
  if(!row.techStatusLog) row.techStatusLog = [];

  if(isRetreat){
    // Drop the most recent forward entry.
    if(row.techStatusLog.length > 0) row.techStatusLog.pop();
    // If we retreated out of a terminal state, reset row.status.
    if(['done','maint_done','reinstall_done','uninstall_done','cancelled','rescheduled'].indexOf(prevMainStatus) !== -1){
      row.status = 'scheduled';
    }
  } else {
    row.techStatusLog.push({
      status: newStatus,
      at: new Date().toISOString(),
      guide: guideNum
    });
    // Terminal statuses update the main status field
    if(newStatus==='install_done'||newStatus==='completed') row.status='done';
    else if(newStatus==='maint_done') row.status='maint_done';
    else if(newStatus==='reinstall_done') row.status='reinstall_done';
    else if(newStatus==='uninstall_done') row.status='uninstall_done';
    else if(newStatus==='cancelled') row.status='cancelled';
    else if(newStatus==='rescheduled') row.status='rescheduled';
  }

  // Write to Firebase
  const stamped=Object.assign({}, row, {
    _lastModifiedBy:'tech:'+guideName,
    _lastModifiedAt:new Date().toISOString()
  });

  const dot=document.getElementById('sync-dot');
  dot.style.background='rgba(255,200,50,0.9)';
  dot.classList.add('pulsing');
  _writingIds.add(id);

  _fbRef.child('rows').child(String(id)).set(stamped).then(()=>{
    _writingIds.delete(id);
    dot.style.background='rgba(100,220,120,0.9)';
    dot.classList.remove('pulsing');
    const info=techStatusInfo(newStatus);
    // Undo toast: 6-second window to reverse an accidental tap (advance OR
    // retreat). One tap on Undo fully restores techStatus, row.status, and
    // the techStatusLog from the pre-tap snapshot.
    const toastMsg = isRetreat
      ? `Step ${stepIndex(prevStatus||'not_started')} un-ticked`
      : (info ? info.icon + ' ' + info.label : newStatus);
    toastUndo(toastMsg, 6000, function(){
      if(!row) return;
      row.techStatus = prevStatus;
      row.status = prevMainStatus;
      // Restore the full log snapshot (covers both pushed advance and
      // popped retreat).
      row.techStatusLog = prevLog.slice();
      _writingIds.add(id);
      _fbRef.child('rows').child(String(id)).set(Object.assign({}, row, {
        _lastModifiedBy:'tech:'+guideName+' (undo)',
        _lastModifiedAt:new Date().toISOString()
      })).then(()=>{ _writingIds.delete(id); renderStops(); saveToCache(); toast('↩ Undone'); })
        .catch(()=>{ _writingIds.delete(id); toast('Undo failed — check connection'); });
    });
  }).catch(e=>{
    _writingIds.delete(id);
    dot.style.background='rgba(220,100,80,0.9)';
    dot.classList.remove('pulsing');
    toast('Failed to save — check connection');
    console.warn('Firebase write error',e);
  });

  renderStops();
  saveToCache();
}

/* ─── HELPERS ─── */
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.onclick=null;
  el.style.cursor='';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}
// Toast with an "Undo" affordance. Tapping anywhere on the toast invokes
// the callback. Auto-dismisses after durationMs.
function toastUndo(msg, durationMs, onUndo){
  const el=document.getElementById('toast');
  el.innerHTML = '<span>'+msg+'</span>' +
    '<span style="margin-left:14px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.22);font-weight:600">↩ Undo</span>';
  el.style.cursor='pointer';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  let fired = false;
  el.onclick = function(){
    if(fired) return;
    fired = true;
    el.onclick = null;
    el.style.cursor = '';
    el.classList.remove('show');
    clearTimeout(_toastTimer);
    try { onUndo(); } catch(e){ console.warn('undo handler error',e); }
  };
  _toastTimer = setTimeout(()=>{
    el.onclick = null;
    el.style.cursor = '';
    el.classList.remove('show');
  }, durationMs || 6000);
}
</script>
